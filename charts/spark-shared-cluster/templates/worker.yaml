apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "spark-shared-cluster.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "spark-shared-cluster.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: worker
spec:
  serviceName: {{ include "spark-shared-cluster.fullname" . }}-worker
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "spark-shared-cluster.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: worker
    spec:
      serviceAccountName: {{ include "spark-shared-cluster.serviceAccountName" . }}
      containers:
        - name: spark-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/opt/spark/k8s-scripts/start-worker.sh"]
          ports:
            - name: webui
              containerPort: {{ .Values.worker.webui.port }}
          env:
            - name: SPARK_MASTER_URL
              value: "spark://{{ include "spark-shared-cluster.fullname" . }}-master.{{ .Release.Namespace }}.svc.cluster.local:7077"
            - name: SPARK_WORKER_CORES
              value: "{{ .Values.worker.cores }}"
            - name: SPARK_WORKER_MEMORY
              value: "{{ .Values.worker.memory }}"
            - name: SPARK_WORKER_WEBUI_PORT
              value: "{{ .Values.worker.webui.port }}"
          resources:
            requests:
              cpu: {{ .Values.worker.cpuRequest | quote }}
              memory: {{ .Values.worker.memoryRequest | quote }}
            limits:
              cpu: {{ .Values.worker.cpuLimit | quote }}
              memory: {{ .Values.worker.memoryLimit | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spark-shared-cluster.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: worker
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: worker
  ports:
    - name: webui
      port: {{ .Values.worker.webui.port }}
      targetPort: webui
